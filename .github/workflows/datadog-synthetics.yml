# This workflow runs Datadog Synthetic tests.
# It requires DD_API_KEY and DD_APP_KEY to be set as GitHub repository secrets.
# See: https://docs.datadoghq.com/account_management/api-app-keys/
#
# To enable this workflow:
# 1. Go to your Datadog dashboard and generate an API Key and Application Key.
# 2. In GitHub: Settings → Secrets and variables → Actions → New repository secret.
#    - Name: DD_API_KEY  Value: <your datadog api key>
#    - Name: DD_APP_KEY  Value: <your datadog app key>
# 3. Remove the `if: false` line below.

name: Run Datadog Synthetic tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  datadog-synthetics:
    runs-on: ubuntu-latest
    # Disabled until DD_API_KEY and DD_APP_KEY secrets are configured.
    if: ${{ secrets.DD_API_KEY != '' && secrets.DD_APP_KEY != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Datadog Synthetic tests
        uses: DataDog/synthetics-ci-github-action@87b505388a22005bb8013481e3f73a367b9a53eb # v1.4.0
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          app_key: ${{ secrets.DD_APP_KEY }}
          test_search_query: "tag:e2e-tests"
